<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="Author" content="Chris Rose" />
    <meta name="Description" content="A flash card study aid platform" />
    <meta
      name="Keywords"
      content="study aids, flashcards, learning materials"
    />
    <title>cardousel</title>
    <link rel="stylesheet" href="assets/css/index.css" />
    <link rel="favicon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a class="header__link" href="#home">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a class="nav__link" href="#home">My Decks</a></li>
          <li><a class="nav__link" href="#about">About</a></li>
        </ul>
      </nav>
    </header>
    <main class="page__main-content">
      <template id="deck__template">
        <li class="card">
          <h3 class="card__title"></h3>
          <div class="card__row">
            <p class="card__count"></p>
            <button
              class="card__delete-btn"
              type="button"
              aria-label="Deck Delete Button"
            ></button>
          </div>
          <a class="card__link" href="#"></a>
        </li>
      </template>
      <template id="card__template">
        <li class="card">
          <h3 class="card__title"></h3>
          <div class="card__row">
            <button
              class="card__flip-btn"
              type="button"
              aria-label="Card Flip Button"
            ></button>
            <button
              class="card__delete-btn"
              type="button"
              aria-label="Deck Delete Button"
            ></button>
          </div>
        </li>
      </template>
      <section id="home" class="gallery">
        <h2 class="gallery__title">My Decks</h2>
        <div class="wrapping-row">
          <ul class="gallery__list"></ul>
          <button
            class="gallery__new-card-btn"
            type="button"
            aria-label="New Deck Button"
          >
            + New Deck
          </button>
        </div>
      </section>
      <section id="deck-view" class="gallery">
        <div class="gallery__header">
          <h2 class="gallery__title"></h2>
          <button
            class="practice-btn"
            type="button"
            aria-label="Practice Button"
          >
            Practice
          </button>
        </div>
        <div class="wrapping-row">
          <ul class="gallery__list"></ul>
          <button
            class="gallery__new-card-btn"
            type="button"
            aria-label="New Card Button"
          >
            + New Card
          </button>
        </div>
      </section>
      <section id="not-found" class="not-found">
        <h2 class="not-found__status-code">404</h2>
        <p class="not-found__text">Sorry, nothing found!</p>
      </section>
      <section id="carousel" class="carousel">
        <h2 class="carousel__title">HTML Tags Deck &middot; 1/10</h2>
        <div class="carousel__grid">
          <button
            type="button"
            class="carousel__btn carousel__btn_type_left carousel__btn_disabled"
            aria-label="carousel button left"
          ></button>
          <div class="carousel__card">
            <p class="carousel__card-text">&lt;body&gt;&lt;/body&gt;</p>
          </div>
          <button
            type="button"
            class="carousel__btn carousel__btn_type_right carousel__btn_disabled"
            aria-label="carousel button right"
          ></button>
          <button
            type="button"
            class="carousel__btn carousel__btn_type_flip"
            aria-label="carousel button flip"
          ></button>
        </div>
      </section>
    </main>
    <div id="delete-confirmation-modal" class="modal hidden" aria-hidden="true">
      <div
        class="modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="delete-modal-title"
      >
        <h3 id="delete-modal-title" class="modal__title">Delete this card?</h3>
        <p class="modal__message">
          Are you sure you want to delete this card? This action cannot be
          undone.
        </p>
        <div class="modal__actions">
          <button type="button" class="modal__btn modal__btn_cancel">
            Cancel
          </button>
          <button type="button" class="modal__btn modal__btn_confirm">
            Delete
          </button>
        </div>
      </div>
    </div>
    <footer class="footer">
      <p class="footer__text">&copy; 2026 Chris Rose</p>
    </footer>
    <script src="assets/js/index.js" type="module"></script>
  </body>
</html>
